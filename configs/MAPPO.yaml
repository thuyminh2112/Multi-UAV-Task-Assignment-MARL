exp_name: MAPPO
result_dir: ../results/MAPPO

first_device: 0

gpus: 1
seed: 42

env:
  n_uav: 10
  m_tasks: 7
  x_max: 2000
  y_max: 2000
  na: 12  
  m_kit: 0.2

uav:
  dt: 1
  v_max: 20
  v_min: 0
  h_max: 6  
  C_uav: [3,5,4,1,2,5,3,7,2,5] # payload capacity
  # C_uav: [3,5,4,1,2,5,3]
  P_0: 79.85 # power consumption when hovering
  U_tip: 120
  W_uav: [0.7, 1.3, 2.0, 2.7, 3.5, 0.7, 1.3, 2.0, 2.7, 3.5] # weight
  # W_uav: [0.7, 1.3, 2.0, 2.7, 3.5, 0.7, 1.3]
  d_0: 0.6
  rho: 1.225
  s: 0.05
  A: 0.503
  d_safe: 10
  E_fly: 4000000
  dc: 500
  dp: 200
  alpha: 0.6
  beta: 0.4
  gamma: 0.2

task:
  R_task: 100
  # w_task: [1,3,2,5,2,7,10] # task workload
  w_task: [1,3,2,5,2,4,1] 

actor_critic:
  buffer_size: 1000000
  sample_size: 0 
  actor_lr: 1e-4
  critic_lr: 5e-4
  hidden_dim: 128
  gamma: 0.95
